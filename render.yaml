services:
  - type: web
    name: alvarez-pos
    runtime: python
    region: oregon
    plan: free
    buildCommand: >-
      pip install -r requirements_api.txt &&
      cd frontend &&
      npm ci &&
      npm run build &&
      cd ..
    startCommand: uvicorn backend.main_api:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RENDER
        value: "true"
